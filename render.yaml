services:
  - type: web
    name: pharm-agent-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    repo: https://github.com/abhilash0042/pharm-agent
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: REDIS_URL # Ensure celery_app.py uses this
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: WORKER_TOKEN
        sync: false

  - type: worker
    name: pharm-agent-worker
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: celery -A backend.celery_app worker --loglevel=info
    repo: https://github.com/abhilash0042/pharm-agent
    plan: free
    envVars:
      - key: DATABASE_URL
        fromService:
          type: web
          name: pharm-agent-api
          envVarKey: DATABASE_URL
      - key: MINIO_ENDPOINT
        fromService:
          type: web
          name: pharm-agent-api
          envVarKey: MINIO_ENDPOINT
      - key: MINIO_ACCESS_KEY
        fromService:
          type: web
          name: pharm-agent-api
          envVarKey: MINIO_ACCESS_KEY
      - key: MINIO_SECRET_KEY
        fromService:
          type: web
          name: pharm-agent-api
          envVarKey: MINIO_SECRET_KEY
      - key: REDIS_URL
        fromService:
          type: web
          name: pharm-agent-api
          envVarKey: REDIS_URL
      - key: OPENROUTER_API_KEY
        fromService:
          type: web
          name: pharm-agent-api
          envVarKey: OPENROUTER_API_KEY
      - key: WORKER_TOKEN
        fromService:
          type: web
          name: pharm-agent-api
          envVarKey: WORKER_TOKEN
